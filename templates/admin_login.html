{% extends 'base.html' %}

{% block content %}
<section class="max-w-md mx-auto px-4 py-20">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-extrabold text-gray-950">Вход для персонала</h1>
            <p class="text-gray-500 text-sm mt-1">Для доступа к панели введите учетные данные</p>
        </div>

        {% if error %}
            <div class="bg-red-50 border border-red-200 text-red-600 text-sm p-3 rounded-xl mb-4 text-center font-medium">
                {{ error }}
            </div>
        {% endif %}

        <form action="{{ url_for('admin_login') }}" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Имя пользователя</label>
                <input type="text" name="username" required placeholder="admin" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:border-pink-500 focus:ring-2 focus:ring-pink-100 transition">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Пароль</label>
                <input type="password" name="password" required placeholder="••••••••" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:border-pink-500 focus:ring-2 focus:ring-pink-100 transition">
            </div>

            <button type="submit" class="w-full bg-pink-600 text-white font-bold py-3 rounded-xl hover:bg-pink-700 active:scale-[0.99] transition duration-150 shadow-md shadow-pink-100 cursor-pointer">
                Войти в систему
            </button>
        </form>
    </div>
</section>
{% endblock %}
